<!DOCTYPE html>
<html>
<head>
<title>My Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌸 BACKGROUND */
body {
    background: 
        linear-gradient(rgba(255, 230, 240, 0.7), rgba(230, 247, 255, 0.7)),
        url("https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?auto=format&fit=crop&w=1500&q=80");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    font-family: 'Poppins', sans-serif;
}

/* 🌸 GLASS CARD */
.box {
    max-width: 420px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);

    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    text-align: center;

    animation: fadeIn 0.6s ease-in-out;
}

/* 🌸 TITLE */
h4 {
    color: #ff4da6;
    font-weight: 600;
}

/* 🌸 INPUTS */
input, textarea {
    border-radius: 12px !important;
    padding: 10px;
    border: 1px solid #eee;
}

input:focus, textarea:focus {
    border-color: #ff4da6;
    box-shadow: 0 0 5px rgba(255,77,166,0.3);
}

/* 🌸 BUTTON */
.btn-save {
    background: linear-gradient(45deg, #ff4da6, #ff85c1);
    border: none;
    padding: 10px;
    border-radius: 12px;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.btn-save:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #e60073, #ff66b2);
}

/* 🌸 POPUP STYLE */
.popup {
    position: fixed;
    top: 20px;
    right: 20px;

    background: white;
    padding: 15px 20px;
    border-radius: 12px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.1);

    display: none;
    animation: slideIn 0.5s ease;
}

/* ANIMATION */
@keyframes slideIn {
    from {transform: translateX(100%); opacity: 0;}
    to {transform: translateX(0); opacity: 1;}
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>

</head>

<body>

<div class="box">

<h4>👤 My Account</h4>
<p style="color:#666;">Manage your personal details</p>

<form method="POST" action="/save_account" onsubmit="showPopup(event)">

<input type="text" name="name" placeholder="Full Name" class="form-control mt-3" value="{{ user.name }}" required>

<input type="text" name="phone" placeholder="Phone Number" class="form-control mt-3" value="{{ user.phone }}" required>

<textarea name="address" placeholder="Your Address" class="form-control mt-3" required>{{ user.address }}</textarea>

<button class="btn-save mt-3 w-100">
Save Details 💖
</button>

</form>

</div>

<!-- 🌸 POPUP -->
<div id="popup" class="popup">
    ✅ Details Saved Successfully 💕
</div>

<!-- 🌸 SCRIPT -->
<script>
function showPopup(event) {
    event.preventDefault(); // stop reload

    let popup = document.getElementById("popup");
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
        event.target.submit(); // form submit after popup
    }, 1500);
}
</script>

</body>
</html>
