<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fb;
    font-family: 'Poppins', sans-serif;
}

.box {
    max-width: 500px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.payment-option {
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

.payment-option:hover {
    border-color: #ff4da6;
}

.pay-btn {
    width: 100%;
    background: linear-gradient(45deg, #ff4da6, #ff85c1);
    border: none;
    padding: 10px;
    border-radius: 10px;
    color: white;
    font-weight: 600;
}
</style>

</head>

<body>

<div class="box">

<h4>💳 Payment</h4>

<!-- ✅ FORM -->
<form method="POST" action="/place_order" onsubmit="return showPopup()">

<div class="payment-option">
    <input type="radio" name="payment" value="UPI" required> UPI (PhonePe / GPay)
</div>

<div class="payment-option">
    <input type="radio" name="payment" value="Card"> Credit / Debit Card
</div>

<div class="payment-option">
    <input type="radio" name="payment" value="COD"> Cash on Delivery
</div>

<hr>

<h5>Total: ₹{{ total }}</h5>

<button type="submit" class="pay-btn mt-3">
    Place Order
</button>

</form>

</div>

<!-- ✅ POPUP SCRIPT -->
<script>
function showPopup() {

    let selected = document.querySelector('input[name="payment"]:checked');

    if(!selected){
        alert("Please select payment method");
        return false;
    }

    alert("🎉 Your Order is Placed!\nThank you for shopping with us ❤️");

    return true; 
}
</script>

</body>
</html>
